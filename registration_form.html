<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Validiation</title>
        <style>
            body{
                font-family: Arial;
                background: #f0f2f5;
                text-align: center;
            }
            .container{
                width: 350px;
                margin: 30px auto;
                background: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px gray;
            }
            input{
                width: 90%;
                padding: 10px;
                margin: 8px;
            }
            button{
                background: blue;
                color: white;
                border: none;
                padding: 10px 20px;
                cursor: pointer;            
            }
            .hidden{
                display: none; 
            }
        </style>
    </head>
    <body>
        <h2>Form Validiation Project</h2>
        <div class="container">
            <div id="loginForm">
                <h3>Login</h3>
                <input type="email" id="loginEmail" placeholder="Email"><br>
                <input type="password" id="loginPassword" placeholder="Password"><br>
                <button onclick="login()">Login</button>
                <p>Do not have an account ?<a href="#" onclick="showSignup()">Sign Up</a></p>
            </div>
            <div id="signupForm">
                <h3>Sign up</h3>
                <input type="text" id="name" placeholder="Full Name"><br>
                <input type="email" id="email" placeholder="Email"><br>
                <input type="password" id="password" placeholder="Password"><br>
                <input type="password" id="confirmPassword" placeholder="Confirm Password"><br>
                <button onclick="signup()">Register</button>
                <p>Already have an account ?<a href="#" onclick="showLogin()">Login</a></p>
            </div>
            <div id="regForm">
                <h3>Registration</h3>
                <input type="text" id="rname" placeholder="Name"><br>
                <input type="email" id="remail" placeholder="Email"><br>
                <input type="number" id="phone" placeholder="Phone no"><br>
                <button onclick="register()">Submit</button>
            </div>
        </div>
        <script>
            function showSignup(){
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("signupForn").style.display = "block";
            }
            function showLogin(){
                document.getElementById("signupForm").style.display = "none";
                document.getElementById("loginForn").style.display = "block";
            }
            function login(){
                let email=document.getElementById("loginEmail").value;
                let pass=document.getElementById("loginPassword").value;
                if(email == "" || pass == ""){
                    alert("All feilds required !!");
                    return false;
                }
                alert("Login Successful");
            }
            function signup(){
                let name=document.getElementById("name").value;
                let email=document.getElementById("email").value;
                let pass=document.getElementById("password").value;
                let cpass=document.getElementById("confirmPassword").value;
                if(name == "" || email == "" || pass == "" || cpass == ""){
                    alert("Fill all feilds !!");
                    return;
                }
                if(pass !== cpass){
                    alert("Password do not match !!");
                    return;
                }
                alert("Signup Successful");
            document.getElementById("signupForm").style.display="none";
            document.getElementById("regForm").style.display="block";
            }
            function register(){
                let name=document.getElementById("rname").value;
                let email=document.getElementById("remail").value;
                let phone=document.getElementById("phone").value;
                if(name == "" || email == "" || phone == ""){
                    alert("All fields required !!");
                    return;
                }
                if(phone.length < 10){
                    alert("Invalid phone number !!");
                    return;
                }
                alert("Registration Complete");
            }
        </script>
    </body>
</html>
