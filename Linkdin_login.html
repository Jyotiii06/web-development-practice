<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Login Clone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f2ef;
    }

    .container {
      width: 350px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .logo {
      color: #0077b5;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0 0 10px;
    }

    p {
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0077b5;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #005f8d;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 5px;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .footer a {
      color: #0077b5;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">LinkedIn</div>
    <h2>Sign in</h2>
    <p>Stay updated on your professional world</p>

    <input type="text" id="email" placeholder="Email or Phone">
    <input type="password" id="password" placeholder="Password">
    
    <div id="errorMsg" class="error"></div>

    <button onclick="login()">Sign in</button>

    <div class="footer">
      New to LinkedIn? <a href="#">Join now</a>
    </div>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      if (email === "" || password === "") {
        errorMsg.textContent = "Please fill in all fields.";
        return;
      }

      // Fake login check
      if (email === "admin@gmail.com" && password === "123456") {
        alert("Login successful!");
        window.location.href = "index.html"; // redirect to feed page
      } else {
        errorMsg.textContent = "Invalid email or password.";
      }
    }
  </script>

</body>
</html>
